<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App - Profile</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="app-header">
        <h1 class="app-title">User Profile</h1>
    </header>

    <main class="card-container">
        <section class="profile-card">
            <div class="profile-avatar">👤</div>
            <h2 class="profile-name">Lorelai Gilmore</h2>
            <p class="profile-bio">I need coffee in an IV. I live for fast dialogue and Stars Hollow drama.</p>
            
            <div class="profile-stats">
                <div class="stat-item">
                    <span class="stat-count">2</span>
                    <span class="stat-label">Bookmarks</span>
                </div>
                <div class="stat-item">
                    <span class="stat-count">10</span>
                    <span class="stat-label">Questions</span>
                </div>
            </div>
        </section>
    </main>

    <nav class="navbar">
        <a href="index.html" class="nav-link" aria-label="Home">🏠</a>
        <a href="bookmarks.html" class="nav-link" aria-label="Bookmarks">🔖</a>
        <a href="profile.html" class="nav-link active" aria-label="Profile">👤</a>
    </nav>

</body>
</html>
